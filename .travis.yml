language: ruby
rvm:
  - 2.5.3
addons:
  apt:
    # update the list above if more deps are introduced
    packages:
    - gcc
    - libcurl4-openssl-dev
    - libsdl1.2-dev
    - libgc-dev
    - libsfml-dev
    - libc6-dbg
    - valgrind
before_script:
  - chmod +x ./scripts/*.sh

  - git clone https://github.com/nim-lang/Nim.git
  - cd Nim
  - sh build_all.sh
  # - git clone --depth 1 https://github.com/nim-lang/csources.git
  # - export PATH="$PWD/bin${PATH:+:$PATH}"
  # - make -C csources -j 2 LD=$CC ucpu=$CPU

  - export NIM=/home/travis/build/nim-lang-cn/website/Nim/bin
  - export NIMBLE_DIR=/home/travis/.nimble
  - export PATH=$PATH:$NIM:$NIMBLE
  # - export nimversion=1.2.0

  # - export nimversion = `nim -v`

  - gem install bundler
script:
  - cd ../jekyll
  - bundle exec jekyll build
after_success:
  - cd ./_site
  
  # 绑定域名
  - echo "nim-lang-cn.org" > CNAME

  # 创建 choosenim 的安装脚本
  - mkdir docs choosenim
  - cd choosenim/ && wget https://nim-lang.org/choosenim/init.sh && cd ..

  # 创建文档库样式
  - cd /home/travis/build/nim-lang-cn/website/Nim/doc
  - ls -la ./html
  - cp ./nimdoc.css /home/travis/build/nim-lang-cn/website/jekyll/_site/docs/nimdoc.out.css
  - cp ./*.js /home/travis/build/nim-lang-cn/website/jekyll/_site/docs/

  # 生成文档、教程、手册
  # - sh /home/travis/build/nim-lang-cn/website/scripts/rst2html.sh

  # 根据标准库生成文档
  # - cd ../lib
  # - sh /home/travis/build/nim-lang-cn/website/scripts/nim_doc_lib.sh
  
  - cd ..
  # - echo "travis_fold:start:nim_c_koch"
  # - nim c koch
  # - echo "travis_fold:end:nim_c_koch"
  # - echo "travis_fold:start:koch_boot"
  # - ./koch boot
  # - echo "travis_fold:end:koch_boot"
  - echo "travis_fold:start:koch_doc"
  - ./koch doc
  - echo "travis_fold:end:koch_doc"

  - cp -rf /home/travis/build/nim-lang-cn/Nim/doc/html/* /home/travis/build/nim-lang-cn/website/jekyll/_site/doc/
  
  - cd /home/travis/build/nim-lang-cn/website/jekyll/_site/
  - echo "import system" > v.nim
  - echo "" >> v.nim
  - echo "echo system.NimVersion" >> v.nim

  - nim c -r v.nim
  - rm -f v.nim
  - echo `./v` > version
  - rm -f ./v
  - cp -rf /home/travis/build/nim-lang-cn/Nim/web/upload/`cat ./version`/* /home/travis/build/nim-lang-cn/website/jekyll/_site/doc/

  # 更新到 GitHub 上的 nim-lang-cn/website 的 gh-pages 分支
  - cd /home/travis/build/nim-lang-cn/website/jekyll/_site
  - git init
  - git config user.name "DongyunLee"
  - git config user.email "dongyunli619@gmail.com"
  - git add .
  - git commit -m "Update"
  - git push --force --quiet "https://${GH_TOKEN}@github.com/nim-lang-cn/website.git" master:gh-pages
branches:
  only:
    - master
env:
  global:
    - NOKOGIRI_USE_SYSTEM_LIBRARIES=true
addons:
  apt:
    packages:
      - libcurl4-openssl-dev

cache:
  - bundler # caching bundler gem packages will speed up build
